name: FedEx priskoll
 
on:
  schedule:
    - cron: '0 4,14,21 * * *'   # 06:00, 16:00 & 23:00 svensk sommartid
  workflow_dispatch:          # gör att du kan starta en körning manuellt via Actions-fliken
 
permissions:
  contents: write
 
concurrency: priskoll
 
jobs:
  priskoll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      - name: Installera Playwright (Firefox)
        run: |
          pip install playwright
          playwright install --with-deps firefox
 
      - name: Kör priskollen
        run: xvfb-run -a python scrape.py
 
      - name: Spara mätpunkten
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/history.json
          git diff --cached --quiet || git commit -m "Ny mätning $(date -u +'%Y-%m-%d %H:%M') UTC"
          git pull --rebase
          git push
 
      - name: Ladda upp felsökningsfiler
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: debug/
          if-no-files-found: ignore
